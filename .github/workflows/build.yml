name: Swift Build

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Swift Package
        run: swift build
      - name: Run tests
        run: swift test || echo "No tests yet"
